name: Release assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build assets for
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            goos: darwin
            goarch: amd64
            ext: dylib
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: so
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: so
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: dll

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up MinGW
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            zip

      - name: Build Unix asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [ -n "${{ inputs.tag }}" ]; then
            version="${{ inputs.tag }}"
            version="${version#v}"
          fi
          mkdir -p dist
          CGO_ENABLED=1 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -buildmode=c-shared -o "dist/codex-invite.${{ matrix.ext }}" .
          rm -f dist/codex-invite.h
          (
            cd dist
            zip -q "codex-invite_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" \
              "codex-invite.${{ matrix.ext }}"
          )

      - name: Build Windows asset
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          version="${{ inputs.tag }}"
          version="${version#v}"
          mkdir -p dist
          CGO_ENABLED=1 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -buildmode=c-shared -o "dist/codex-invite.${{ matrix.ext }}" .
          rm -f dist/codex-invite.h
          (
            cd dist
            zip -q "codex-invite_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" \
              "codex-invite.${{ matrix.ext }}"
          )

      - uses: actions/upload-artifact@v4
        with:
          name: codex-invite-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Download existing Darwin arm64 asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "codex-invite_${version}_darwin_arm64.zip" \
            --dir dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum codex-invite_*.zip > checksums.txt
          cat checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" dist/codex-invite_*.zip dist/checksums.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
