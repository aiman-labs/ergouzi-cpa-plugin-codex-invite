name: Build

on:
  pull_request:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_NAME: codex-invite

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

      - name: Vet
        run: make vet

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-15
          - goos: windows
            goarch: amd64
            runner: windows-2025
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up MinGW
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Resolve release metadata
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "ARCHIVE_NAME=${PLUGIN_NAME}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" >> "${GITHUB_ENV}"

      - name: Build and package plugin
        run: make package VERSION="${VERSION}" GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

  build-windows-arm64:
    name: Build windows/arm64
    needs: test
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release metadata
        id: release_metadata
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "ARCHIVE_NAME=${PLUGIN_NAME}_${VERSION}_windows_arm64.zip" >> "${GITHUB_ENV}"

      - name: Build Windows ARM64 shared library
        timeout-minutes: 45
        uses: go-cross/cgo-actions@v1
        env:
          GOFLAGS: -trimpath -buildmode=c-shared
        with:
          dir: .
          packages: .
          targets: windows-arm64
          out-dir: dist/windows-arm64
          output: ${{ env.PLUGIN_NAME }}.dll
          flags: -ldflags=-s -w
          x-flags: main.pluginVersion=${{ steps.release_metadata.outputs.version }}

      - name: Package plugin
        run: |
          set -euo pipefail
          rm -f go-cross-bin.h "dist/windows-arm64/${PLUGIN_NAME}.h"
          go run ./.github/scripts/package-release.go \
            -library "dist/windows-arm64/${PLUGIN_NAME}.dll" \
            -archive "dist/${ARCHIVE_NAME}" \
            -checksum "dist/${ARCHIVE_NAME}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

  build-freebsd:
    name: Build freebsd/amd64
    needs: test
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release metadata
        id: release_metadata
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "ARCHIVE_NAME=${PLUGIN_NAME}_${VERSION}_freebsd_amd64.zip" >> "${GITHUB_ENV}"

      - name: Install FreeBSD cross-build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang lld wget

      - name: Build FreeBSD shared library
        timeout-minutes: 45
        uses: go-cross/cgo-actions@v1
        env:
          GOFLAGS: -trimpath -buildmode=c-shared
        with:
          dir: .
          packages: .
          targets: freebsd-amd64
          out-dir: dist/freebsd-amd64
          output: ${{ env.PLUGIN_NAME }}.so
          flags: -ldflags=-s -w
          x-flags: main.pluginVersion=${{ steps.release_metadata.outputs.version }}

      - name: Package plugin
        run: |
          set -euo pipefail
          rm -f go-cross-bin.h "dist/freebsd-amd64/${PLUGIN_NAME}.h"
          go run ./.github/scripts/package-release.go \
            -library "dist/freebsd-amd64/${PLUGIN_NAME}.so" \
            -archive "dist/${ARCHIVE_NAME}" \
            -checksum "dist/${ARCHIVE_NAME}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - build-windows-arm64
      - build-freebsd
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sort dist/*.sha256 > dist/checksums.txt
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.zip dist/checksums.txt --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.zip dist/checksums.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated release for ${GITHUB_REF_NAME}."
          fi

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-24.04
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - test
      - build
      - build-windows-arm64
      - build-freebsd
      - release
    steps:
      - name: Notify admin channel
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_ADMIN_WEBHOOK_URL }}
          NEEDS_JSON: ${{ toJson(needs) }}
          RELEASE_KIND: CPA Codex Invite plugin release
          RELEASE_ARTIFACTS: plugin archives and checksums.txt
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_ADMIN_WEBHOOK_URL is not set; skipping Discord notification."
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad_jobs = {name: data.get("result") for name, data in needs.items() if data.get("result") != "success"}
          ok = not bad_jobs
          title = f"{'✅' if ok else '❌'} {os.environ['RELEASE_KIND']} {'完成' if ok else '失败'}"
          lines = [
              title,
              f"仓库：{os.environ['REPOSITORY']}",
              f"Tag：{os.environ['TAG_NAME']}",
              f"产物：{os.environ['RELEASE_ARTIFACTS']}",
              f"Release：{os.environ['RELEASE_URL']}",
              f"Workflow：{os.environ['RUN_URL']}",
          ]
          if bad_jobs:
              failed = ", ".join(f"{name}={result}" for name, result in sorted(bad_jobs.items()))
              lines.append(f"异常 job：{failed}")

          payload = {
              "content": "\n".join(lines),
              "allowed_mentions": {"parse": []},
          }
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=15) as response:
                  if response.status not in (200, 204):
                      print(f"Discord notification returned HTTP {response.status}; continuing.", file=sys.stderr)
          except Exception:
              print("Discord notification failed; continuing.", file=sys.stderr)
          PY
